# Sonar properties for this repository.
sonar.projectKey=JuanForero531_PetGo
sonar.projectName=PetGo
sonar.organization=juanforero531

# Source folders
sonar.sources=src
sonar.tests=__tests__
sonar.test.inclusions=**/__tests__/**

# Coverage report produced by Jest
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8

sonar.coverage.exclusions=\
  **/*.config.js,\
  **/*.config.jsx,\
  **/*.config.ts,\
  **/index.js,\
  **/main.jsx,\
  **/main.tsx,\
  **/__mocks__/**,\
  **/scripts/**,\
  **/*.test.js,\
  **/*.test.jsx

# Optional: exclude test helpers, mocks or other files
# sonar.exclusions=**/*.spec.js,**/*.test.js,public/**
