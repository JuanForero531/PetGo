# Sonar properties for this repository. Replace placeholders before use.
sonar.projectKey=PetGo
sonar.projectName=PetGo
# For SonarCloud set sonar.organization (example: your-org)
# sonar.organization=your-organization

# Source folders
sonar.sources=src
sonar.tests=__tests__
sonar.test.inclusions=**/__tests__/**

# Coverage report produced by Jest
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8

# Optional: exclude test helpers, mocks or other files
# sonar.exclusions=**/*.spec.js,**/*.test.js,public/**
